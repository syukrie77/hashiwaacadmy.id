# hashiwaacademy.id (non-www)
server {
    server_name hashiwaacademy.id;
    client_max_body_size 500M;

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/hashiwaacademy.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hashiwaacademy.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# www -> redirect ke non-www
server {
    server_name www.hashiwaacademy.id;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/www.hashiwaacademy.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.hashiwaacademy.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://hashiwaacademy.id$request_uri;
}

# HTTP -> HTTPS
server {
    listen 80;
    server_name hashiwaacademy.id www.hashiwaacademy.id;
    return 301 https://hashiwaacademy.id$request_uri;
}
