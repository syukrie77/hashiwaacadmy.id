###############################################
# NGINX CONFIG - Hashiwa E-Learning
# 
# Cara pakai:
#   1. Ganti "hashiwa.example.com" dengan domain Anda
#   2. Copy ke VPS: /etc/nginx/sites-available/hashiwa
#   3. Buat symlink: ln -s /etc/nginx/sites-available/hashiwa /etc/nginx/sites-enabled/
#   4. Test: nginx -t
#   5. Reload: systemctl reload nginx
#   6. Setup SSL: certbot --nginx -d hashiwa.example.com
###############################################

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name hashiwa.example.com;
    
    # Untuk certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hashiwa.example.com;

    # SSL (akan di-auto-generate certbot, atau isi manual)
    ssl_certificate /etc/letsencrypt/live/hashiwa.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hashiwa.example.com/privkey.pem;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Max upload size (sesuaikan kebutuhan)
    client_max_body_size 500M;

    # ==========================================
    # Hashiwa App (port 8004)
    # ==========================================
    location / {
        proxy_pass http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

