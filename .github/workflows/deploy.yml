name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 101.32.239.76
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/hashiwa

            echo ">>> Git pull..."
            git pull origin main

            echo ">>> Tulis ulang .env.app..."
            cat > .env.app << 'ENVEOF'
            ${{ secrets.ENV_APP }}
            ENVEOF

            echo ">>> Build Docker image..."
            docker compose -f docker-compose.app.yml --env-file .env.app build --no-cache

            echo ">>> Restart container..."
            docker compose -f docker-compose.app.yml --env-file .env.app up -d

            echo ">>> Done!"
