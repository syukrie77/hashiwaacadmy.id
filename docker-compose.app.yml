# ============================================
# Hashiwa Academy - Astro App Docker Compose
# Deploy di VPS yang sama dengan Supabase
# ============================================
version: "3.8"

services:
  hashiwa-app:
    container_name: hashiwa-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # PUBLIC_* vars needed at BUILD TIME by Vite/Astro (import.meta.env)
        PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL:-https://api.hashiwaacademy.id}
        PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
        # Internal URL also resolved at build time for server-side code
        SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-http://supabase2-kong:8000}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-4321}:4321"
    environment:
      # Runtime env vars (also passed as build args above)
      PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL:-https://api.hashiwaacademy.id}
      PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-http://supabase2-kong:8000}
      # Node.js config
      NODE_ENV: production
      HOST: "0.0.0.0"
      PORT: "4321"
      # Payment gateway
      XENDIT_API_KEY: ${XENDIT_API_KEY}
      XENDIT_WEBHOOK_TOKEN: ${XENDIT_WEBHOOK_TOKEN}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://hashiwaacademy.id}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    # Connect ke network Docker Supabase yang sudah ada
    networks:
      - supabase_network

# Gunakan network yang SAMA dengan docker-compose Supabase
# Cari nama network dengan: docker network ls
# Biasanya: <folder_supabase>_default
networks:
  supabase_network:
    external: true
    name: ${DOCKER_NETWORK_NAME:-supabase_default}